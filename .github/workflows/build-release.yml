name: Build Windows EXE and publish Release asset

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          echo "tag=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      - name: Create client_config.json from secrets
        shell: pwsh
        run: |
          $config = @{
            installed = @{
              client_id = "${{ secrets.GOOGLE_CLIENT_ID }}"
              client_secret = "${{ secrets.GOOGLE_CLIENT_SECRET }}"
              auth_uri = "https://accounts.google.com/o/oauth2/auth"
              token_uri = "https://oauth2.googleapis.com/token"
              redirect_uris = @("http://localhost")
            }
          }
          $config | ConvertTo-Json -Depth 3 | Set-Content -Path "client_config.json" -Encoding UTF8

      - name: Build Windows EXE
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.tag }}"
          pyinstaller --noconfirm --clean --onefile --windowed --collect-data googleapiclient --add-data "client_config.json;." --name "ChatGPTExportConverter-$ver" app.py

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/ChatGPTExportConverter-${{ steps.version.outputs.tag }}.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
